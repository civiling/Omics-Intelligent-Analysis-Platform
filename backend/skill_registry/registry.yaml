skills:
  - id: scrna.data_ingestion
    name: Single-cell RNA-seq data ingestion and format detection
    domain: scrna
    version: 0.1.0
    status: active
    description: Inspect uploaded single-cell expression matrix files, infer format, register ExpressionMatrix objects, and generate a sample metadata template.
    path: skills/scrna/data-ingestion
    input_types:
      - matrix_directory
    output_types:
      - expression_matrix_manifest
      - sample_metadata_template
      - data_readiness_report
      - method_note
      - risk_notes
    primary_tools:
      - platform MatrixFormatInspector
      - platform DataIngestionService
    risk_level: low
    requires_review: false
    next_skills:
      - scrna.metadata_design
      - reporting.evidence_report_generation
    executor:
      type: local
      path: workflows/scripts/scrna/data_ingestion.py

  - id: scrna.metadata_design
    name: Single-cell RNA-seq metadata and experiment design recognition
    domain: scrna
    version: 0.1.0
    status: active
    description: Import sample metadata, evaluate condition, batch, and patient pairing, and recommend the appropriate single-cell analysis mode.
    path: skills/scrna/metadata-design
    input_types:
      - platform_store
      - metadata_table
    output_types:
      - metadata_import_report
      - experiment_design_summary
      - analysis_mode_recommendation
      - confidence_gate_result
      - sample_metadata_template
      - method_note
      - risk_notes
    primary_tools:
      - platform MetadataDesignService
    risk_level: low
    requires_review: false
    next_skills:
      - transcriptomics.differential_expression
      - reporting.evidence_report_generation
    executor:
      type: local
      path: workflows/scripts/scrna/metadata_design.py

  - id: scrna.qc_clustering
    name: Single-cell RNA-seq QC and clustering preview
    domain: scrna
    version: 0.1.0
    status: active
    description: Compute per-cell QC metrics, apply filtering thresholds, and produce first-stage UMAP-like embedding and cluster outputs for result display.
    path: skills/scrna/qc-clustering
    input_types:
      - platform_store
    output_types:
      - cell_qc_metrics
      - sample_qc_summary
      - qc_clustering_report
      - umap_embedding
      - umap_plot_data
      - qc_violin_plot_data
      - method_note
      - risk_notes
    primary_tools:
      - platform QcClusteringService
    risk_level: low
    requires_review: false
    next_skills:
      - reporting.evidence_report_generation
    executor:
      type: local
      path: workflows/scripts/scrna/qc_clustering.py

  - id: microbiome.read_qc
    name: Microbiome read and feature table QC
    domain: microbiome
    version: 0.1.0
    status: active
    description: Basic QC specification for microbiome reads, ASV/OTU tables, taxonomy tables, and sample metadata.
    path: skills/microbiome/read-qc
    input_types:
      - reads
      - feature_table
      - taxonomy_table
      - metadata
    output_types:
      - qc_summary
      - filtering_recommendation
      - method_note
      - risk_notes
    primary_tools:
      - FastQC
      - MultiQC
      - QIIME 2
      - DADA2
    risk_level: low
    requires_review: false
    next_skills:
      - microbiome.differential_abundance
      - multiomics.correlation_network
      - reporting.evidence_report_generation
    executor:
      type: placeholder
      path: null

  - id: microbiome.differential_abundance
    name: Differential abundance analysis
    domain: microbiome
    version: 0.1.0
    status: active
    description: Differential microbiome abundance analysis specification with compositional data safeguards.
    path: skills/microbiome/differential-abundance
    input_types:
      - feature_table
      - taxonomy_table
      - metadata
    output_types:
      - differential_taxa_table
      - volcano_plot_spec
      - method_note
      - risk_notes
    primary_tools:
